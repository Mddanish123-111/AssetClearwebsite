services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetclear
    ports:
      - "5432:5432"
    volumes:
      - assetclear_pgdata:/var/lib/postgresql/data

volumes:
  assetclear_pgdata:
